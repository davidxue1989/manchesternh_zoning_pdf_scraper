name: Check for new ZBA PDFs

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test email (yes/no)"
        required: false
        default: "no"

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated manifest.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new PDFs
        id: check
        env:
          NOTIFY_FROM: ${{ secrets.NOTIFY_FROM }}
          NOTIFY_PASSWORD: ${{ secrets.NOTIFY_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: |
          if [ "${{ github.event.inputs.test_email }}" = "yes" ]; then
            python notify.py --test-email
          else
            python notify.py --email
          fi

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          # Only commit if manifest actually changed
          git diff --cached --quiet || git commit -m "chore: update PDF manifest [skip ci]"
          git push
