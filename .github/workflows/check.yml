name: Check for new ZBA PDFs

on:
  schedule:
    # Runs every Monday and Thursday at 9 AM ET (13:00 UTC)
    # The ZBA typically meets on the 2nd and 4th Thursday of the month
    - cron: "0 13 * * 1,4"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated manifest.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new PDFs
        id: check
        env:
          NOTIFY_FROM: ${{ secrets.NOTIFY_FROM }}
          NOTIFY_PASSWORD: ${{ secrets.NOTIFY_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: |
          python notify.py --email
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          # Only commit if manifest actually changed
          git diff --cached --quiet || git commit -m "chore: update PDF manifest [skip ci]"
          git push
